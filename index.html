<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トレーニング管理 | おしえてかめさん</title>
    
    <!-- ホーム画面用アイコン設定 -->
    <link rel="apple-touch-icon" href="IMG_4231.png">
    <link rel="icon" type="image/png" href="IMG_4231.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="トレ管理">

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>🐢 トレーニング・ログ</h1>
            <p>種別を選んでカレンダーに記録</p>
        </header>

        <main>
            <div class="menu-grid">
                <!-- 筋トレ：赤 (#e74c3c) -->
                <button class="menu-btn workout" onclick="selectMenu('筋トレ', '#e74c3c', '🔴')">
                    <span class="icon">🏋️</span>
                    <span class="label">筋トレ</span>
                </button>
                <!-- ランニング：黄 (#f1c40f) -->
                <button class="menu-btn running" onclick="selectMenu('ランニング', '#f1c40f', '🟡')">
                    <span class="icon">🏃</span>
                    <span class="label">ランニング</span>
                </button>
                <!-- レストトレーニング：青 (#3498db) -->
                <button class="menu-btn rest" onclick="selectMenu('レストトレーニング', '#3498db', '🔵')">
                    <span class="icon">🧘</span>
                    <span class="label">レストトレ</span>
                </button>
            </div>

            <div id="selection-detail" class="detail-card hidden">
                <h3 id="detail-header">選択中: <span id="selected-name"></span></h3>
                <div class="input-group">
                    <label for="memo">内容・振り返り:</label>
                    <textarea id="memo" placeholder="（例：スクワット、LSD 10km、動的休息など）"></textarea>
                </div>
                <button id="submit-btn" class="calendar-btn" onclick="addToCalendar()">Googleカレンダーに追加</button>
            </div>
        </main>

        <footer>
            <p>© 2026 おしえてかめさん - 継続は力なり</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
